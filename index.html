<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CANCIONERO RAYISTA</title>

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="escudo-rayo.png">

  <style>
    :root {
      --bg: #08090d;
      --card: #141622;
      --text: #f6f6f6;
      --muted: #a9adba;
      --accent: #e3292f;
      --accent2: #ffffff;
      --line: #2a2d3a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background: #050507;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(0,0,0,0.93), rgba(0,0,0,0.95)),
        radial-gradient(circle at top left, rgba(227,41,47,0.16), transparent 34%),
        url("conference-bg.jpg");
      background-size: cover, cover, cover;
      background-position: center center, center center, center center;
      background-repeat: no-repeat;
    }

    header,
    main {
      position: relative;
      z-index: 1;
    }

    header {
      padding: 28px 18px 16px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      background: rgba(0,0,0,0.22);
      backdrop-filter: blur(6px);
    }

    .titleRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 0 auto;
    }

    .crest {
      height: clamp(38px, 8vw, 62px);
      width: auto;
      flex: 0 0 auto;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 56px);
      line-height: 0.95;
      letter-spacing: -1.5px;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.7);
    }

    main {
      width: min(900px, 94vw);
      margin: 0 auto;
      padding: 12px 0 170px;
    }

    .hidden {
      display: none !important;
    }

    .card {
      background: rgba(20,22,34,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    .song-title {
      margin-bottom: 16px;
    }

    .song-title h2 {
      margin: 0;
      font-size: 26px;
    }

    audio {
      width: 100%;
      margin: 8px 0 12px;
    }

    .playerBar {
      position: sticky;
      bottom: 10px;
      z-index: 50;
      background: rgba(20,22,34,0.96);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #111;
      background: white;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    .jumpBtn {
      position: fixed;
      left: 50%;
      bottom: 122px;
      transform: translateX(-50%);
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.25);
      background: white;
      color: #111;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45);
    }

    .lyrics {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .line {
      padding: 14px 12px;
      margin: 6px 0;
      border-radius: 16px;
      color: rgba(255,255,255,0.42);
      font-size: clamp(22px, 5vw, 42px);
      line-height: 1.12;
      font-weight: 900;
      text-align: center;
      transition: all 0.18s ease;
      cursor: pointer;
      user-select: none;
    }

    .line.active {
      color: white;
      background: linear-gradient(90deg, rgba(227,41,47,0.95), rgba(255,255,255,0.12));
      transform: scale(1.02);
      text-shadow: 0 2px 20px rgba(0,0,0,0.45);
    }

    .line.past {
      color: rgba(255,255,255,0.68);
    }

    .index {
      margin-bottom: 16px;
      display: grid;
      gap: 10px;
    }

    .index a {
      color: white;
      text-decoration: none;
      background: rgba(20,22,34,0.78);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 800;
      transition: all 0.18s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
    }

    .index a.active {
      background: linear-gradient(90deg, rgba(227,41,47,0.95), rgba(255,255,255,0.12));
      border-color: rgba(255,255,255,0.28);
      color: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transform: scale(1.01);
    }

    .siteFooter {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      opacity: 0.9;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    @media (max-width: 640px) {
      body::before {
        background:
          linear-gradient(rgba(0,0,0,0.94), rgba(0,0,0,0.96)),
          radial-gradient(circle at top left, rgba(227,41,47,0.12), transparent 36%),
          url("conference-bg.jpg");
        background-size: cover, cover, cover;
        background-position: center top, center top, center top;
        background-repeat: no-repeat;
      }

      .titleRow {
        gap: 10px;
      }

      .crest {
        height: clamp(34px, 9vw, 48px);
      }

      h1 {
        font-size: clamp(31px, 8vw, 44px);
      }

      .jumpBtn {
        bottom: 132px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="badge">Cancionero Rayista · Leipzig</div>

    <div class="titleRow">
      <img class="crest" src="escudo-rayo.png" alt="" aria-hidden="true">
      <h1>La Franja en Leipzig</h1>
    </div>

    <p class="subtitle">Porque seremos menos en Alemania, SE NOS TIENE QUE OÍR MÁS.</p>
  </header>

  <main>
    <section class="index" id="songIndex"></section>

    <section class="card hidden" id="karaoke">
      <div class="song-title">
        <h2 id="songTitle"></h2>
      </div>

      <div class="playerBar">
        <audio id="audio" preload="auto" controls>
          Tu navegador no puede reproducir este audio.
        </audio>

        <div class="controls">
          <button class="primary" id="playBtn">▶ Play / Pausa</button>
        </div>
      </div>

      <div class="lyrics" id="lyrics"></div>
    </section>

    <footer class="siteFooter">@Guyb</footer>
  </main>

  <button id="jumpBtn" class="jumpBtn hidden">↓ Ir a línea actual</button>

  <script>
    const audio = document.getElementById("audio");
    const lyricsEl = document.getElementById("lyrics");
    const playBtn = document.getElementById("playBtn");
    const songIndex = document.getElementById("songIndex");
    const songTitle = document.getElementById("songTitle");
    const jumpBtn = document.getElementById("jumpBtn");
    const karaokeCard = document.getElementById("karaoke");

    const songs = [
      {
        id: "vamos-rayo",
        title: "Vamos Rayo",
        audio: "heart-9-fanchants-free.mp3",
        lines: [
          { time: 0.0, text: "Vamos Rayo, te venimos a ver," },
          { time: 6.0, text: "pon más huevos, hoy no puedes perder," },
          { time: 12.0, text: "te llevamos, dentro del corazón," },
          { time: 18.0, text: "este año vamos a salir campeón." },
          { time: 23.9, text: "Vamos Rayo, te venimos a ver," },
          { time: 29.5, text: "pon más huevos, hoy no puedes perder," },
          { time: 36.8, text: "te llevamos, dentro del corazón," },
          { time: 42.5, text: "este año vamos a salir campeón..." }
        ]
      },
      {
        id: "viste-la-luz",
        title: "Un buen día viste la luz",
        audio: "vistelaluz.mp3",
        lines: [
          { time: 0.0, text: "Fue hace más de 80 años," },
          { time: 3.6, text: "un buen día viste la luz," },
          { time: 6.5, text: "eres el órgullo," },
          { time: 10.0, text: "de un barrio óbrero." },
          { time: 13.5, text: "Rayito no temas hoy," },
          { time: 17.0, text: "en estos tiempos málos," },
          { time: 20.0, text: "porque Vallecas no," },
          { time: 23.5, text: "te dejará solo..." },
          { time: 26.0, text: "Lolololo," },
          { time: 37.0, text: "Fue hace más de 80 años," },
          { time: 41.0, text: "un buen día viste la luz," },
          { time: 44.8, text: "eres el órgullo," },
          { time: 48.0, text: "de un barrio óbrero." },
          { time: 51.0, text: "Rayito no temas hoy," },
          { time: 54.8, text: "en estos tiempos málos," },
          { time: 57.7, text: "porque Vallecas no," },
          { time: 61.0, text: "te dejará solo..." },
          { time: 64.0, text: "Lolololo," }
        ]
      },
      {
        id: "te-vengo-a-ver",
        title: "Porque te quiero, te vengo a ver",
        audio: "tevengoaver.mp3",
        lines: [
          { time: 0.0, text: "Porque te quiero, te vengo a ver," },
          { time: 3.0, text: "échale huevos, hoy no podemos perder," },
          { time: 6.0, text: "y dale dale dale dale dale Rayo," },
          { time: 8.8, text: "y dale dale dale dale dale ya," },
          { time: 11.4, text: "porque te quiero, te vengo a ver," },
          { time: 15.0, text: "échale huevos, hoy no podemos perder," },
          { time: 18.0, text: "y dale dale dale dale dale Rayo," },
          { time: 20.8, text: "y dale dale dale dale dale ya," },
          { time: 23.0, text: "porque te quiero, te vengo a ver," },
          { time: 26.9, text: "échale huevos, hoy no podemos perder," },
          { time: 30.0, text: "y dale dale dale dale dale Rayo," },
          { time: 33.0, text: "y dale dale dale dale dale ya..." }
        ]
      },
      {
        id: "el-rayo-fui-yo",
        title: "El Rayo fui yo (Duro Galván)",
        audio: "rayofuiyo.mp3",
        lines: [
          { time: 52.0, text: "Vive entre casas tras el Bulevar," },
          { time: 55.0, text: "equipo de calle en un puerto." },
          { time: 59.0, text: "Niñas y abuelos hicieron llegar," },
          { time: 62.0, text: "la herencia de Prudencia Priego." },
          { time: 66.0, text: "No sé qué tiene este dulce pesar," },
          { time: 70.0, text: "que me lleva hasta el infierno." },
          { time: 73.0, text: "Ladrillos rojos te han visto brindar," },
          { time: 76.5, text: "pensando en derrotas de ayer." },
          { time: 80.0, text: "De Villa hasta el Puente no habrá capitán," },
          { time: 84.0, text: "tan solo una franja en el viento." },
          { time: 88.0, text: "Todas las noches antes de marchar," },
          { time: 91.0, text: "cantaba a capella las letras" },
          { time: 94.0, text: "sobre el Santa Inés, navegar, vivir mejor," },
          { time: 100.0, text: "de gigantes partidos en dos," },
          { time: 103.5, text: "sobre quien pudo contar," },
          { time: 106.5, text: "este sueño de la agrupación..." },
          { time: 110.5, text: "Por si no vuelvo a creer," },
          { time: 115.0, text: "cántame nuestra canción," },
          { time: 119.0, text: "llévame donde empecé," },
          { time: 121.5, text: "llévame al barrio mi amor." },
          { time: 125.0, text: "Por si no te vuelvo a ver," },
          { time: 129.0, text: "canta en Payaso Fofó," },
          { time: 133.0, text: "diles que he vuelto a creer," },
          { time: 136.0, text: "diles que el Rayo fui yo..." },
          { time: 154.0, text: "Por si no vuelvo a creer," },
          { time: 158.0, text: "cántame nuestra canción," },
          { time: 162.0, text: "llévame donde empecé," },
          { time: 165.0, text: "llévame al barrio mi amor..." },
          { time: 168.0, text: "Por si no te vuelvo a ver," },
          { time: 172.0, text: "canta en Payaso Fofó," },
          { time: 176.0, text: "diles que he vuelto a creer," },
          { time: 180.0, text: "diles que el Rayo fui yo." }
        ]
      },
      {
        id: "oe-rayo-oe",
        title: "Cantaremos todos unidos",
        audio: "oerayooe.mp3",
        lines: [
          { time: 0.0, text: "Cantaremos todos unidos," },
          { time: 3.0, text: "alzaremos fuerte la voz," },
          { time: 6.0, text: "para que solo se escuche aquello de..." },
          { time: 9.0, text: "Oeee Rayo oeeee," },
          { time: 12.0, text: "oeee Rayo oeeee," },
          { time: 15.0, text: "oeee ooeeee ooeeee Rayo oeeee..." }
        ]
      },
      {
        id: "isi-palazon",
        title: "Por la mañana café (Jara)",
        audio: "estebam.mp3",
        lines: [
          { time: 0.0, text: "Por la mañana café," },
          { time: 1.9, text: "por la tarde ron," },
          { time: 3.8, text: "llévanos a Leipzig," },
          { time: 6.0, text: "Isi Palazón." }
        ]
      }
    ];

    let currentSong = null;

    function renderIndex() {
      songIndex.innerHTML = "";

      songs.forEach((song, index) => {
        const link = document.createElement("a");
        link.href = "#karaoke";
        link.textContent = "🔊 " + song.title;

        link.addEventListener("click", (event) => {
          event.preventDefault();

          if (currentSong && currentSong.id === song.id) {
            collapseSong();
            return;
          }

          loadSong(index);

          document.getElementById("karaoke").scrollIntoView({
            block: "start",
            behavior: "smooth"
          });
        });

        songIndex.appendChild(link);
      });

      updateActiveSongLink();
    }

    function updateActiveSongLink() {
      const links = songIndex.querySelectorAll("a");

      links.forEach((link, index) => {
        link.classList.toggle(
          "active",
          currentSong && songs[index].id === currentSong.id
        );
      });
    }

    function collapseSong() {
      audio.pause();
      audio.currentTime = 0;
      audio.removeAttribute("src");
      audio.load();

      currentSong = null;
      songTitle.textContent = "";
      lyricsEl.innerHTML = "";

      karaokeCard.classList.add("hidden");
      jumpBtn.classList.add("hidden");

      updateActiveSongLink();

      songIndex.scrollIntoView({
        block: "start",
        behavior: "smooth"
      });
    }

    function loadSong(index) {
      currentSong = songs[index];

      karaokeCard.classList.remove("hidden");
      jumpBtn.classList.remove("hidden");

      audio.pause();
      audio.currentTime = 0;
      audio.src = currentSong.audio;
      audio.load();

      songTitle.textContent = currentSong.title;

      updateActiveSongLink();
      renderLyrics();
      updateActiveLine();
    }

    function renderLyrics() {
      lyricsEl.innerHTML = "";

      if (!currentSong) {
        return;
      }

      currentSong.lines.forEach((line, index) => {
        const div = document.createElement("div");
        div.className = "line";
        div.dataset.index = index;
        div.textContent = line.text;

        div.addEventListener("click", async () => {
          const activeIndex = getActiveIndex(audio.currentTime);
          const isCurrentLine = activeIndex === index;
          const isPlaying = !audio.paused;

          if (isCurrentLine && isPlaying) {
            audio.pause();
            updateActiveLine();
            return;
          }

          audio.currentTime = line.time;
          updateActiveLine();

          try {
            await audio.play();
          } catch (error) {
            alert("El navegador ha bloqueado el audio. Prueba a pulsar el reproductor nativo.");
          }
        });

        lyricsEl.appendChild(div);
      });
    }

    function getActiveIndex(currentTime) {
      if (!currentSong) {
        return 0;
      }

      let active = 0;

      for (let i = 0; i < currentSong.lines.length; i++) {
        if (currentTime >= currentSong.lines[i].time) {
          active = i;
        }
      }

      return active;
    }

    function updateActiveLine() {
      if (!currentSong) {
        return;
      }

      const activeIndex = getActiveIndex(audio.currentTime);
      const lineEls = document.querySelectorAll(".line");

      lineEls.forEach((el, index) => {
        el.classList.toggle("active", index === activeIndex);
        el.classList.toggle("past", index < activeIndex);
      });
    }

    function jumpToActiveLine() {
      if (!currentSong) {
        return;
      }

      const activeIndex = getActiveIndex(audio.currentTime);
      const lineEls = document.querySelectorAll(".line");
      const activeEl = lineEls[activeIndex];

      if (activeEl) {
        activeEl.scrollIntoView({
          block: "center",
          behavior: "smooth"
        });
      }
    }

    playBtn.addEventListener("click", async () => {
      if (!currentSong) {
        return;
      }

      try {
        if (audio.paused) {
          await audio.play();
        } else {
          audio.pause();
        }
      } catch (error) {
        alert("El navegador ha bloqueado el audio. Prueba a pulsar el reproductor nativo.");
      }
    });

    jumpBtn.addEventListener("click", jumpToActiveLine);

    audio.addEventListener("timeupdate", updateActiveLine);
    audio.addEventListener("seeked", updateActiveLine);
    audio.addEventListener("loadedmetadata", updateActiveLine);

    renderIndex();
  </script>
</body>
</html>
