<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CANCIONERO RAYISTA</title>

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="escudo-rayo.png">

  <style>
    :root {
      --bg: #08090d;
      --card: #141622;
      --text: #f6f6f6;
      --muted: #a9adba;
      --accent: #e3292f;
      --accent2: #ffffff;
      --line: #2a2d3a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background: #050507;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(0,0,0,0.82), rgba(0,0,0,0.90)),
        radial-gradient(circle at top left, rgba(227,41,47,0.14), transparent 34%),
        url("rojo.jpg");
      background-size: cover, cover, cover;
      background-position: center center, center center, center center;
      background-repeat: no-repeat;
    }

    header,
    main {
      position: relative;
      z-index: 1;
    }

    header {
      padding: 28px 18px 16px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      background: rgba(0,0,0,0.22);
      backdrop-filter: blur(6px);
    }

    .titleRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 0 auto;
    }

    .titleIcon {
      height: clamp(38px, 8vw, 62px);
      width: auto;
      flex: 0 0 auto;
      display: block;
      object-fit: contain;
    }

    .trophyIcon {
      height: clamp(44px, 9vw, 72px);
      width: auto;
      flex: 0 0 auto;
      display: block;
      object-fit: contain;
    }

    .homeLink {
      color: inherit;
      text-decoration: none;
      display: inline-block;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 56px);
      line-height: 0.95;
      letter-spacing: -1.5px;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.7);
    }

    main {
      width: min(900px, 94vw);
      margin: 0 auto;
      padding: 12px 0 170px;
    }

    .hidden {
      display: none !important;
    }

    .card {
      background: rgba(20,22,34,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    .song-title {
      margin-bottom: 16px;
    }

    .song-title h2 {
      margin: 0;
      font-size: 26px;
      cursor: pointer;
    }

    .song-title h2:hover {
      color: white;
      text-shadow: 0 0 18px rgba(227,41,47,0.35);
    }

    audio {
      width: 100%;
      margin: 8px 0 12px;
    }

    .playerBar {
      position: sticky;
      bottom: 10px;
      z-index: 50;
      background: rgba(20,22,34,0.96);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #111;
      background: white;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    .lyrics {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .line {
      padding: 14px 12px;
      margin: 6px 0;
      border-radius: 16px;
      color: rgba(255,255,255,0.42);
      font-size: clamp(22px, 5vw, 42px);
      line-height: 1.12;
      font-weight: 900;
      text-align: center;
      transition: all 0.18s ease;
      cursor: pointer;
      user-select: none;
    }

    .line.active {
      color: white;
      background: linear-gradient(90deg, rgba(227,41,47,0.95), rgba(255,255,255,0.12));
      transform: scale(1.02);
      text-shadow: 0 2px 20px rgba(0,0,0,0.45);
    }

    .line.past {
      color: rgba(255,255,255,0.68);
    }

    .index {
      margin-bottom: 16px;
      display: grid;
      gap: 10px;
    }

    .index a {
      color: white;
      text-decoration: none;
      background: rgba(20,22,34,0.78);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 15px 17px;
      font-size: clamp(17px, 2.4vw, 19px);
      font-weight: 850;
      letter-spacing: -0.15px;
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
      backdrop-filter: blur(8px);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.24),
        0 0 0 rgba(227,41,47,0);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .index a:hover {
      transform: translateY(-2px) scale(1.006);
      border-color: rgba(227,41,47,0.46);
      background: rgba(26,24,34,0.86);
      box-shadow:
        0 14px 34px rgba(0,0,0,0.34),
        0 0 18px rgba(227,41,47,0.18);
    }

    .index a.active {
      background: linear-gradient(90deg, rgba(227,41,47,0.95), rgba(255,255,255,0.12));
      border-color: rgba(255,255,255,0.30);
      color: white;
      box-shadow:
        0 8px 24px rgba(0,0,0,0.38),
        0 0 22px rgba(227,41,47,0.22);
      transform: scale(1.012);
    }

    .speakerIcon {
      font-size: 1.22em;
      line-height: 1;
      filter: drop-shadow(0 0 5px rgba(227,41,47,0.45));
      flex: 0 0 auto;
    }

    .songLabel {
      line-height: 1.15;
      text-shadow: 0 2px 10px rgba(0,0,0,0.75);
    }

    .siteFooter {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      opacity: 0.9;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      display: grid;
      gap: 4px;
    }

    @media (max-width: 640px) {
      body::before {
        background:
          linear-gradient(rgba(0,0,0,0.86), rgba(0,0,0,0.93)),
          radial-gradient(circle at top left, rgba(227,41,47,0.10), transparent 36%),
          url("rojo.jpg");
        background-size: cover, cover, cover;
        background-position: center top, center top, center top;
        background-repeat: no-repeat;
      }

      .titleRow {
        gap: 10px;
      }

      .titleIcon {
        height: clamp(34px, 9vw, 48px);
      }

      .trophyIcon {
        height: clamp(39px, 10vw, 56px);
      }

      h1 {
        font-size: clamp(31px, 8vw, 44px);
      }

      .index a {
        padding: 15px 15px;
        font-size: clamp(16px, 4.2vw, 18px);
      }

      .speakerIcon {
        font-size: 1.18em;
      }
    }
  </style>
</head>

          loadSong(index);

          document.getElementById("karaoke").scrollIntoView({
            block: "start",
            behavior: "smooth"
          });
        });

        songIndex.appendChild(link);
      });

      updateActiveSongLink();
    }

    function updateActiveSongLink() {
      const links = songIndex.querySelectorAll("a");

      links.forEach((link, index) => {
        link.classList.toggle(
          "active",
          currentSong && songs[index].id === currentSong.id
        );
      });
    }

    function collapseSong() {
      audio.pause();
      audio.currentTime = 0;
      audio.removeAttribute("src");
      audio.load();

      currentSong = null;
      songTitle.textContent = "";
      lyricsEl.innerHTML = "";

      karaokeCard.classList.add("hidden");

      updateActiveSongLink();

      songIndex.scrollIntoView({
        block: "start",
        behavior: "smooth"
      });
    }

    function loadSong(index) {
      currentSong = songs[index];

      karaokeCard.classList.remove("hidden");

      audio.pause();
      audio.currentTime = 0;
      audio.src = currentSong.audio;
      audio.load();

      songTitle.textContent = currentSong.title;

      updateActiveSongLink();
      renderLyrics();
      updateActiveLine();
    }

    function renderLyrics() {
      lyricsEl.innerHTML = "";

      if (!currentSong) {
        return;
      }

      currentSong.lines.forEach((line, index) => {
        const div = document.createElement("div");
        div.className = "line";
        div.dataset.index = index;
        div.textContent = line.text;

        div.addEventListener("click", async () => {
          const activeIndex = getActiveIndex(audio.currentTime);
          const isCurrentLine = activeIndex === index;
          const isPlaying = !audio.paused;

          if (isCurrentLine && isPlaying) {
            audio.pause();
            updateActiveLine();
            return;
          }

          audio.currentTime = line.time;
          updateActiveLine();

          try {
            await audio.play();
          } catch (error) {
            alert("El navegador ha bloqueado el audio. Prueba a pulsar el reproductor nativo.");
          }
        });

        lyricsEl.appendChild(div);
      });
    }

    function getActiveIndex(currentTime) {
      if (!currentSong) {
        return 0;
      }

      let active = 0;

      for (let i = 0; i < currentSong.lines.length; i++) {
        if (currentTime >= currentSong.lines[i].time) {
          active = i;
        }
      }

      return active;
    }

    function updateActiveLine() {
      if (!currentSong) {
        return;
      }

      const activeIndex = getActiveIndex(audio.currentTime);
      const lineEls = document.querySelectorAll(".line");

      lineEls.forEach((el, index) => {
        el.classList.toggle("active", index === activeIndex);
        el.classList.toggle("past", index < activeIndex);
      });
    }

    playBtn.addEventListener("click", async () => {
      if (!currentSong) {
        return;
      }

      try {
        if (audio.paused) {
          await audio.play();
        } else {
          audio.pause();
        }
      } catch (error) {
        alert("El navegador ha bloqueado el audio. Prueba a pulsar el reproductor nativo.");
      }
    });

    homeLink.addEventListener("click", (event) => {
      event.preventDefault();

      if (currentSong) {
        collapseSong();
      } else {
        window.scrollTo({
          top: 0,
          behavior: "smooth"
        });
      }
    });

    songTitle.addEventListener("click", () => {
      if (currentSong) {
        collapseSong();
      }
    });

    audio.addEventListener("timeupdate", updateActiveLine);
    audio.addEventListener("seeked", updateActiveLine);
    audio.addEventListener("loadedmetadata", updateActiveLine);

    renderIndex();
  </script>
</body>
</html>
