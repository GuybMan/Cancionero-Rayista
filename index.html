<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cancionero Rayista - Leipzig</title>
  <style>
    :root {
      --bg: #08090d;
      --card: #141622;
      --text: #f6f6f6;
      --muted: #a9adba;
      --accent: #e3292f;
      --accent2: #ffffff;
      --line: #2a2d3a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(227,41,47,0.35), transparent 30%),
        linear-gradient(135deg, #050507, #11131d 60%, #1b0b0e);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 28px 18px 16px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 56px);
      line-height: 0.95;
      letter-spacing: -1.5px;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
    }

    main {
      width: min(900px, 94vw);
      margin: 0 auto;
      padding: 12px 0 170px;
    }

    .card {
      background: rgba(20,22,34,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    .song-title {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .song-title h2 {
      margin: 0;
      font-size: 26px;
    }

    .tag {
      background: var(--accent);
      color: white;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    audio {
      width: 100%;
      margin: 8px 0 12px;
    }

    .playerBar {
      position: sticky;
      bottom: 10px;
      z-index: 50;
      background: rgba(20,22,34,0.96);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 22px;
      padding: 12px;
      margin-bottom: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #111;
      background: white;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    .jumpBtn {
      position: fixed;
      left: 50%;
      bottom: 122px;
      transform: translateX(-50%);
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.25);
      background: white;
      color: #111;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45);
    }

    .lyrics {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .line {
      padding: 14px 12px;
      margin: 6px 0;
      border-radius: 16px;
      color: rgba(255,255,255,0.42);
      font-size: clamp(22px, 5vw, 42px);
      line-height: 1.12;
      font-weight: 900;
      text-align: center;
      transition: all 0.18s ease;
    }

    .line.active {
      color: white;
      background: linear-gradient(90deg, rgba(227,41,47,0.95), rgba(255,255,255,0.12));
      transform: scale(1.02);
      text-shadow: 0 2px 20px rgba(0,0,0,0.45);
    }

    .line.past {
      color: rgba(255,255,255,0.68);
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
    }

    .index {
      margin-bottom: 16px;
      display: grid;
      gap: 10px;
    }

    .index a {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 800;
    }

    @media (max-width: 640px) {
      .song-title {
        display: block;
      }

      .tag {
        display: inline-block;
        margin-top: 10px;
      }

      .jumpBtn {
        bottom: 132px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="badge">Cancionero Rayista · Leipzig</div>
    <h1>La Franja en Leipzig</h1>
    <p class="subtitle">Seremos menos, pero se nos oirá más.</p>
  </header>

  <main>
    <section class="index" id="songIndex"></section>

    <section class="card" id="karaoke">
      <div class="song-title">
        <h2 id="songTitle">Vamos Rayo</h2>
        <span class="tag" id="songTag">Imprescindible</span>
      </div>

      <div class="playerBar">
        <audio id="audio" preload="auto" controls>
          Tu navegador no puede reproducir este audio.
        </audio>

        <div class="controls">
          <button class="primary" id="playBtn">▶ Play / Pausa</button>
        </div>
      </div>

      <div class="lyrics" id="lyrics"></div>

      <p class="hint">
        La letra se ilumina sola. La página no baja automáticamente: usa “Ir a línea actual” cuando quieras volver al punto exacto.
      </p>
    </section>
  </main>

  <button id="jumpBtn" class="jumpBtn">↓ Ir a línea actual</button>

  <script>
    const audio = document.getElementById("audio");
    const lyricsEl = document.getElementById("lyrics");
    const playBtn = document.getElementById("playBtn");
    const songIndex = document.getElementById("songIndex");
    const songTitle = document.getElementById("songTitle");
    const songTag = document.getElementById("songTag");
    const jumpBtn = document.getElementById("jumpBtn");

    const songs = [
      {
        id: "vamos-rayo",
        title: "Vamos Rayo",
        tag: "Imprescindible",
        audio: "heart-9-fanchants-free.mp3",
        lines: [
          { time: 0.0, text: "Vamos Rayo, te venimos a ver," },
          { time: 6.0, text: "pon más huevos, hoy no puedes perder," },
          { time: 12.0, text: "te llevamos, dentro del corazón," },
          { time: 18.0, text: "este año vamos a salir campeón." },
          { time: 23.9, text: "Vamos Rayo, te venimos a ver," },
          { time: 29.5, text: "pon más huevos, hoy no puedes perder," },
          { time: 36.8, text: "te llevamos, dentro del corazón," },
          { time: 42.5, text: "este año vamos a salir campeón..." }
        ]
      },
      {
        id: "viste-la-luz",
        title: "Un buen día viste la luz",
        tag: "Imprescindible",
        audio: "vistelaluz.mp3",
        lines: [
          { time: 0.0, text: "Fue hace más de 80 años," },
          { time: 4.0, text: "un buen día viste la luz," },
          { time: 6.5, text: "eres el órgullo," },
          { time: 10.0, text: "de un barrio óbrero." },
          { time: 13.5, text: "Rayito no temas hoy," },
          { time: 17.0, text: "en estos tiempos málos," },
          { time: 20.0, text: "porque Vallecas no," },
          { time: 23.5, text: "te dejará solo." },
          { time: 26.0, text: "Lolololo," },
          { time: 35.5, text: "lolololo," },
          { time: 39.5, text: "Fue hace más de 80 años," },
          { time: 43.5, text: "un buen día viste la luz," },
          { time: 47.5, text: "eres el órgullo," },
          { time: 51.0, text: "de un barrio óbrero." },
          { time: 55.0, text: "Rayito no temas hoy," },
          { time: 59.0, text: "en estos tiempos málos," },
          { time: 63.0, text: "porque Vallecas no," },
          { time: 67.0, text: "te dejará solo..." }
        ]
      }
    ];

    let currentSong = songs[0];

    function renderIndex() {
      songIndex.innerHTML = "";

      songs.forEach((song, index) => {
        const link = document.createElement("a");
        link.href = "#karaoke";
        link.textContent = "▶ " + song.title;

        link.addEventListener("click", (event) => {
          event.preventDefault();
          loadSong(index);

          document.getElementById("karaoke").scrollIntoView({
            block: "start",
            behavior: "smooth"
          });
        });

        songIndex.appendChild(link);
      });
    }

    function loadSong(index) {
      currentSong = songs[index];

      audio.pause();
      audio.currentTime = 0;
      audio.src = currentSong.audio;
      audio.load();

      songTitle.textContent = currentSong.title;
      songTag.textContent = currentSong.tag;

      renderLyrics();
      updateActiveLine();
    }

    function renderLyrics() {
      lyricsEl.innerHTML = "";

      currentSong.lines.forEach((line, index) => {
        const div = document.createElement("div");
        div.className = "line";
        div.dataset.index = index;
        div.textContent = line.text;
        lyricsEl.appendChild(div);
      });
    }

    function getActiveIndex(currentTime) {
      let active = 0;

      for (let i = 0; i < currentSong.lines.length; i++) {
        if (currentTime >= currentSong.lines[i].time) {
          active = i;
        }
      }

      return active;
    }

    function updateActiveLine() {
      const activeIndex = getActiveIndex(audio.currentTime);
      const lineEls = document.querySelectorAll(".line");

      lineEls.forEach((el, index) => {
        el.classList.toggle("active", index === activeIndex);
        el.classList.toggle("past", index < activeIndex);
      });
    }

    function jumpToActiveLine() {
      const activeIndex = getActiveIndex(audio.currentTime);
      const lineEls = document.querySelectorAll(".line");
      const activeEl = lineEls[activeIndex];

      if (activeEl) {
        activeEl.scrollIntoView({
          block: "center",
          behavior: "smooth"
        });
      }
    }

    playBtn.addEventListener("click", async () => {
      try {
        if (audio.paused) {
          await audio.play();
        } else {
          audio.pause();
        }
      } catch (error) {
        alert("El navegador ha bloqueado el audio. Prueba a pulsar el reproductor nativo.");
      }
    });

    jumpBtn.addEventListener("click", jumpToActiveLine);

    audio.addEventListener("timeupdate", updateActiveLine);
    audio.addEventListener("seeked", updateActiveLine);
    audio.addEventListener("loadedmetadata", updateActiveLine);

    renderIndex();
    loadSong(0);
  </script>
</body>
</html>
