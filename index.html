<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cancionero Rayista - Leipzig</title>
  <style>
    :root {
      --bg: #08090d;
      --card: #141622;
      --text: #f6f6f6;
      --muted: #a9adba;
      --accent: #e3292f;
      --accent2: #ffffff;
      --line: #2a2d3a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(227,41,47,0.35), transparent 30%),
        linear-gradient(135deg, #050507, #11131d 60%, #1b0b0e);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 28px 18px 16px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 56px);
      line-height: 0.95;
      letter-spacing: -1.5px;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
    }

    main {
      width: min(900px, 94vw);
      margin: 0 auto;
      padding: 12px 0 48px;
    }

    .card {
      background: rgba(20,22,34,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    .song-title {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .song-title h2 {
      margin: 0;
      font-size: 26px;
    }

    .tag {
      background: var(--accent);
      color: white;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
    }

    audio {
      width: 100%;
      margin: 8px 0 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #111;
      background: white;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    button.active {
      outline: 3px solid rgba(255,255,255,0.45);
    }

    .lyrics {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .line {
      padding: 14px 12px;
      margin: 6px 0;
      border-radius: 16px;
      color: rgba(255,255,255,0.42);
      font-size: clamp(22px, 5vw, 42px);
      line-height: 1.12;
      font-weight: 900;
      text-align: center;
      transition: all 0.18s ease;
    }

    .line.active {
      color: white;
      background: linear-gradient(90deg, rgba(227,41,47,0.95), rgba(255,255,255,0.12));
      transform: scale(1.02);
      text-shadow: 0 2px 20px rgba(0,0,0,0.45);
    }

    .line.past {
      color: rgba(255,255,255,0.68);
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
    }

    .index {
      margin-bottom: 16px;
      display: grid;
      gap: 10px;
    }

    .index a {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 800;
    }

    @media (max-width: 640px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .song-title {
        display: block;
      }

      .tag {
        display: inline-block;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="badge">Cancionero Rayista · Leipzig</div>
    <h1>10.000 gargantas</h1>
    <p class="subtitle">Aprende los cánticos con audio y letra iluminada. Dale al play y canta.</p>
  </header>

  <main>
    <section class="index">
      <a href="#vamos-rayo">▶ Vamos Rayo</a>
    </section>

    <section class="card" id="vamos-rayo">
      <div class="song-title">
        <h2>Vamos Rayo</h2>
        <span class="tag">Imprescindible</span>
      </div>

      <audio id="audio" preload="auto" controls>
        <source src="heart-9-fanchants-free.mp3" type="audio/mpeg">
        Tu navegador no puede reproducir este audio.
      </audio>

      <div class="controls">
        <button class="primary" id="playBtn">▶ Play / Pausa</button>
        <button id="loopBtn">🔁 Bucle</button>
        <button id="slowBtn">🐢 0.85x</button>
      </div>

      <div class="lyrics" id="lyrics"></div>

      <p class="hint">
        Tiempos aproximados. Si una línea entra tarde o pronto, se ajusta en el código cambiando los segundos.
      </p>
    </section>
  </main>

  <script>
    const audio = document.getElementById("audio");
    const lyricsEl = document.getElementById("lyrics");
    const playBtn = document.getElementById("playBtn");
    const loopBtn = document.getElementById("loopBtn");
    const slowBtn = document.getElementById("slowBtn");

    const lines = [
      { time: 0.0, text: "Vamos Rayo, te venimos a ver," },
      { time: 6.0, text: "Pon más huevos, hoy no puedes perder," },
      { time: 10.9, text: "Te llevamos, dentro del corazón," },
      { time: 13.0, text: "Este año vamos a salir campeón," },
      { time: 18.9, text: "Vamos Rayo, te venimos a ver," },
      { time: 23.9, text: "Pon más huevos, hoy no puedes perder," },
      { time: 36.8, text: "Te llevamos, dentro del corazón," },
      { time: 42.5, text: "Este año vamos a salir campeón..." }
    ];

    function renderLyrics() {
      lyricsEl.innerHTML = "";
      lines.forEach((line, index) => {
        const div = document.createElement("div");
        div.className = "line";
        div.dataset.index = index;
        div.textContent = line.text;
        lyricsEl.appendChild(div);
      });
    }

    function getActiveIndex(currentTime) {
      let active = 0;
      for (let i = 0; i < lines.length; i++) {
        if (currentTime >= lines[i].time) {
          active = i;
        }
      }
      return active;
    }

    function updateActiveLine() {
      const activeIndex = getActiveIndex(audio.currentTime);
      const lineEls = document.querySelectorAll(".line");

      lineEls.forEach((el, index) => {
        el.classList.toggle("active", index === activeIndex);
        el.classList.toggle("past", index < activeIndex);
      });

      const activeEl = lineEls[activeIndex];
      if (activeEl) {
        activeEl.scrollIntoView({
          block: "center",
          behavior: "smooth"
        });
      }
    }

    playBtn.addEventListener("click", async () => {
      try {
        if (audio.paused) {
          await audio.play();
        } else {
          audio.pause();
        }
      } catch (error) {
        alert("El navegador ha bloqueado el audio. Prueba a pulsar el reproductor nativo.");
      }
    });

    loopBtn.addEventListener("click", () => {
      audio.loop = !audio.loop;
      loopBtn.classList.toggle("active", audio.loop);
      loopBtn.textContent = audio.loop ? "🔁 Bucle ON" : "🔁 Bucle";
    });

    slowBtn.addEventListener("click", () => {
      if (audio.playbackRate === 1) {
        audio.playbackRate = 0.85;
        slowBtn.classList.add("active");
        slowBtn.textContent = "🐢 0.85x ON";
      } else {
        audio.playbackRate = 1;
        slowBtn.classList.remove("active");
        slowBtn.textContent = "🐢 0.85x";
      }
    });

    audio.addEventListener("timeupdate", updateActiveLine);
    audio.addEventListener("seeked", updateActiveLine);
    audio.addEventListener("loadedmetadata", updateActiveLine);

    renderLyrics();
    updateActiveLine();
  </script>
</body>
</html>
